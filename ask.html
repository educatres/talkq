<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>提出問題｜TalkQ</title><link rel="stylesheet" href="css/styles.css"></head><body>
<header class="site-header"><div class="container"><h1 id="title">演講提問</h1><p>輸入暱稱與問題，不需要登入。</p></div></header><main class="main"><div class="container" style="max-width:720px"><section class="card"><div id="notice" class="notice hidden"></div><form id="askForm"><div class="field"><label for="nickname">暱稱</label><input class="input" id="nickname" maxlength="30" autocomplete="nickname" required><label class="switch-row hint" style="margin-top:8px"><input type="checkbox" id="rememberName" checked><span>在這台裝置記住暱稱</span></label></div><div class="field"><label for="question">想問講師的問題</label><textarea id="question" maxlength="300" required placeholder="請清楚描述你的問題"></textarea><div class="hint"><span id="count">0</span>/300</div></div><label class="switch-row"><input type="checkbox" id="allowPublic" checked><span><strong>我同意公開顯示這則問題</strong><br><span class="hint">若取消勾選，講師仍看得到問題，但不會出現在公開問題清單。</span></span></label><div class="button-row" style="margin-top:20px"><button class="btn btn-primary" id="submitBtn" type="submit">送出問題</button><button class="btn" type="reset">清除</button></div></form></section></div></main><footer class="footer">請勿填寫電話、Email 或其他敏感個資</footer><script type="module" src="js/ask.js"></script></body></html>
