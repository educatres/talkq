<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>講師管理｜TalkQ</title><link rel="stylesheet" href="css/styles.css"></head><body>
<header class="site-header"><div class="container"><h1 id="title">講師提問管理</h1><p>查看全部提問，決定哪些問題公開顯示。</p><nav class="nav"><a id="askLink" target="_blank">開啟提問頁</a><a id="publicLink" target="_blank">開啟公開清單</a></nav></div></header>
<main class="main"><div class="container grid"><section class="card"><div class="grid grid-2"><div><h2>分享 QR Code</h2><div class="grid grid-2"><div class="link-box"><strong>提問頁</strong><div class="qr" id="askQr"></div></div><div class="link-box"><strong>公開清單</strong><div class="qr" id="publicQr"></div></div></div></div><div><h2>提問統計</h2><div class="stats"><div class="stat"><span>全部</span><strong id="sTotal">0</strong></div><div class="stat"><span>待審核</span><strong id="sPending">0</strong></div><div class="stat"><span>已公開</span><strong id="sPublished">0</strong></div><div class="stat"><span>其他</span><strong id="sHidden">0</strong></div></div><p class="sync-line" id="sync">尚未同步</p><div id="notice" class="notice hidden"></div></div></div></section>
<section class="card"><div class="toolbar"><div class="field"><label for="filter">狀態</label><select id="filter"><option value="all">全部</option><option value="pending">待審核</option><option value="published">已公開</option><option value="hidden">已隱藏</option><option value="private">投稿者不同意公開</option></select></div><div class="field"><label for="search">搜尋</label><input class="input" id="search" placeholder="暱稱或問題關鍵字"></div><div class="field"><label for="sort">排序</label><select id="sort"><option value="asc">最早優先</option><option value="desc">最新優先</option></select></div><button class="btn" id="refresh">立即同步</button></div><div id="list" class="question-list"><div class="empty">正在讀取問題…</div></div></section></div></main><footer class="footer">管理網址沒有帳號驗證，請妥善保管</footer><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script type="module" src="js/moderator.js"></script></body></html>
